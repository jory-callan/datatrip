# czwlinux.cloud/go-friday-starter example config
# 示例配置：复制为 config.yml 后按环境修改。
# 时间格式：10s、5m、1h、1d、1y；1d=24h，1y=365d。

# 日志配置：控制日志级别、格式、输出位置和文件轮转。
log:
  # 日志级别：debug/info/warn/error；默认 info。
  level: "info"
  # 日志格式：json/console/text；默认 json。
  format: "console"
  # 输出目标：stdout/file/both；默认 stdout。
  output: "stdout"
  # 日志文件路径：output=file/both 时生效；默认 logs/app.log。
  # file_path: "logs/app.log"
  # 单个日志文件最大大小，单位 MB；默认 100。
  max_size: 100
  # 最多保留旧日志文件数量；默认 5。
  max_backups: 5
  # 旧日志保留天数；默认 7。
  max_age: 7
  # 是否压缩旧日志文件；默认 true。
  compress: true


# HTTP 配置：控制 Echo 监听、超时、中间件。
http:
  # 是否启用 Echo Debug；默认 false。
  enable_debug: false
  # 监听地址：0.0.0.0 表示所有网卡；默认 0.0.0.0。
  host: "0.0.0.0"
  # 监听端口；默认 8080。
  port: 8080
  # 读取请求超时；默认 10s。
  read_timeout: "10s"
  # 写入响应超时；默认 10s。
  write_timeout: "10s"
  # 空闲连接超时；默认 60s。
  idle_timeout: "60s"
  # 优雅关闭等待时间；默认 60s。
  shutdown_timeout: "60s"
  # 最大请求头大小，单位字节；默认 1048576。
  max_header_bytes: 1048576
  # CORS 配置：浏览器跨域访问控制。
  cors:
    # 允许的来源；开发可用 *，生产建议写明确域名。
    allow_origins: ["*"]
    # 允许的 HTTP 方法。
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    # 允许的请求头。
    allow_headers: ["Content-Type", "Authorization", "X-Request-ID"]
    # 允许前端读取的响应头。
    expose_headers: ["X-Request-ID"]
    # 是否允许携带 Cookie/认证凭证；默认 false。
    allow_credentials: false
    # 预检请求缓存时间，单位秒；默认 86400。
    max_age: 86400
  # Prometheus 指标配置。
  metrics:
    # 是否启用指标中间件和指标接口；默认 true。
    enabled: true
    # 指标接口路径；默认 /metrics。
    path: "/metrics"
  # 限流配置：单实例内存限流。
  rate_limit:
    # 是否启用限流；默认 true。
    enabled: true
    # 平均请求速率，单位 req/s；默认 100。
    requests_per_second: 100
    # 突发请求数量；默认 20。
    burst: 20


# 数据库配置：默认 SQLite，便于本地零依赖启动。
database:
  # 数据库驱动：sqlite/mysql/postgres；默认 sqlite。
  driver: "sqlite"
  # 连接字符串；SQLite 默认 demo.sqlite.db。
  dsn: "demo.sqlite.db"
  # 最大打开连接数；默认 50。
  max_open_conns: 50
  # 最大空闲连接数；默认 10。
  max_idle_conns: 10
  # 连接最长复用时间；默认 30m。
  conn_max_lifetime: "30m"
  # 空闲连接最长保留时间；默认 5m。
  conn_max_idle_time: "5m"
  # GORM 日志级别：silent/error/warn/info；默认 warn。
  log_level: "warn"
  # 慢 SQL 阈值；默认 1s。
  slow_threshold: "1s"
  # 表名前缀；默认空字符串。
  table_prefix: ""


# JWT 配置：用于登录态和 Bearer Token。
jwt:
  # 签名密钥；生产必须替换为随机密钥。
  secret: "change-me-in-production"
  # Token 有效期；默认 24h。
  expires: "24h"
  # Token 签发者；默认 go-friday-starter。
  issuer: "go-friday-starter"
