apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datatrip.fullname" . }}-backend
  labels:
    {{- include "datatrip.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      {{- include "datatrip.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "datatrip.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          args:
            - "start"
            - "-c"
            - "/app/config/config.yaml"
          ports:
            - containerPort: {{ .Values.service.backend.port }}
              name: http
              protocol: TCP
          {{- if .Values.probes.backend.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.backend.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.backend.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.backend.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.backend.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.backend.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.backend.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.backend.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.backend.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.backend.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.backend.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            {{- if .Values.sqlite.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.persistence.logs.enabled }}
            - name: logs
              mountPath: /app/logs
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "datatrip.fullname" . }}-backend-config
        {{- if .Values.sqlite.enabled }}
        - name: data
          {{- if .Values.sqlite.existingPvc }}
          persistentVolumeClaim:
            claimName: {{ .Values.sqlite.existingPvc }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.persistence.logs.enabled }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "datatrip.fullname" . }}-backend-logs
        {{- end }}