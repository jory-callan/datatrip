apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datatrip.fullname" . }}-backend-config
  labels:
    {{- include "datatrip.labels" . | nindent 4 }}
data:
  config.yaml: |
    log:
      level: {{ .Values.log.level }}
      format: {{ .Values.log.format }}
      output: "stdout"

    http:
      enable_debug: false
      host: "0.0.0.0"
      port: {{ .Values.service.backend.port }}
      read_timeout: "10s"
      write_timeout: "10s"
      idle_timeout: "60s"
      shutdown_timeout: "60s"
      max_header_bytes: 1048576
      cors:
        allow_origins: ["{{ .Values.http.corsOrigins }}"]
        allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        allow_headers: ["Content-Type", "Authorization", "X-Request-ID"]
        expose_headers: ["X-Request-ID"]
        allow_credentials: false
        max_age: 86400
      metrics:
        enabled: true
        path: "/metrics"
      rate_limit:
        enabled: true
        requests_per_second: 100
        burst: 20

    {{- if .Values.sqlite.enabled }}
    database:
      driver: "sqlite"
      dsn: "/data/datatrip.db"
    {{- else }}
    database:
      driver: "postgres"
      dsn: "host={{ .Values.postgres.host | default (printf "%s-postgresql" (include "datatrip.fullname" .)) }} port={{ .Values.postgres.port }} user={{ .Values.postgres.user }} password={{ .Values.postgres.password }} dbname={{ .Values.postgres.database }} sslmode=disable"
    {{- end }}
      max_open_conns: 50
      max_idle_conns: 10
      conn_max_lifetime: "30m"
      conn_max_idle_time: "5m"
      log_level: "warn"
      slow_threshold: "1s"
      table_prefix: ""

    jwt:
      secret: "{{ .Values.jwt.secret }}"
      expires: "{{ .Values.jwt.expires }}"
      issuer: "datatrip"