# ===== datatrip Helm values =====
# 必填参数：jwt.secret 和数据库连接信息
# 使用方式：
#   helm upgrade --install datatrip ./deploy/chart \
#     --set jwt.secret="your-secret" \
#     --set postgres.enabled=true \
#     --set postgres.password="your-db-password"

# ---- 镜像配置 ----
image:
  backend:
    repository: datatrip-backend
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: datatrip-web
    tag: latest
    pullPolicy: IfNotPresent

# ---- 服务配置 ----
service:
  backend:
    type: ClusterIP
    port: 8080
  web:
    type: ClusterIP
    port: 80

# ---- 域名配置 ----
ingress:
  enabled: false
  host: datatrip.example.com
  className: nginx
  tls:
    enabled: false
    secretName: datatrip-tls

# ---- JWT 配置 ----
jwt:
  secret: "change-me-in-production"
  expires: "24h"

# ---- HTTP 配置 ----
http:
  corsOrigins: "*"

# ---- 日志配置 ----
log:
  level: info
  format: json

# ---- 数据库配置（二选一）----
# 方案 A：PostgreSQL（推荐生产）
postgres:
  enabled: true
  host: ""
  port: 5432
  database: datatrip
  user: datatrip
  password: ""
  # 内置 PostgreSQL 子 chart 配置（当 postgres.enabled=true 且 host 为空时自动部署）
  internal:
    enabled: true
    persistence:
      size: 10Gi

# 方案 B：SQLite（单机测试，基于 emptyDir/ephemeral）
sqlite:
  enabled: false
  # 持久化 PVC 名称，为空则用 emptyDir
  existingPvc: ""

# ---- 资源限制 ----
resources:
  backend:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---- 副本数 ----
replicaCount:
  backend: 1
  web: 1

# ---- 探针 ----
probes:
  backend:
    enabled: true
    path: /api/v1/health
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

# ---- 持久化 ----
persistence:
  backend:
    enabled: true
    size: 2Gi
    storageClass: ""
  logs:
    enabled: true
    size: 1Gi
    storageClass: ""

# ---- 其他 ----
nameOverride: ""
fullnameOverride: ""