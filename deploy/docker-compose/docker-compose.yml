# ===== docker-compose 生产部署 =====
# 使用方法：
#   1. 编辑 docker-compose.yml，修改环境变量（JWT_SECRET、DB_DSN 等）
#   2. docker compose up -d
#   3. 访问 http://localhost:8080
#
# 数据库：默认使用 PostgreSQL（推荐生产），也支持 SQLite（零依赖）。
#   - PostgreSQL：取消注释 db 服务，注释掉 environment 中的 SQLite DSN
#   - SQLite：取消注释 environment 中的 SQLite DSN，注释掉 db 服务
#
# 持久化：后端日志、SQLite 数据库、PostgreSQL 数据均持久化到 volumes。
# 网络：所有服务在同一个 compose 网络内，通过服务名互相访问。

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    image: datatrip-backend:latest
    container_name: datatrip-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ---- 数据库（二选一）----
      # PostgreSQL（推荐生产）
      DB_DRIVER: "postgres"
      DB_DSN: "host=db port=5432 user=datatrip password=datatrip dbname=datatrip sslmode=disable"
      # SQLite（零依赖，单机测试）
      # DB_DRIVER: "sqlite"
      # DB_DSN: "/data/datatrip.db"
      # ---- JWT ----
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRES: "24h"
      # ---- HTTP ----
      HTTP_PORT: "8080"
      HTTP_CORS_ORIGINS: "*"
      # ---- 日志 ----
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
    volumes:
      - backend-data:/data
      - backend-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - datatrip-net

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
    image: datatrip-web:latest
    container_name: datatrip-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - datatrip-net

  db:
    image: postgres:16-alpine
    container_name: datatrip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: datatrip
      POSTGRES_PASSWORD: datatrip
      POSTGRES_DB: datatrip
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datatrip"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - datatrip-net

volumes:
  backend-data:
  backend-logs:
  pgdata:

networks:
  datatrip-net:
    driver: bridge